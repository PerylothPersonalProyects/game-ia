version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: clicker-mongodb
    restart: unless-stopped
    
    # Puerto no estándar: 27027 (externo) → 27017 (interno)
    # Solo accesible desde localhost y IPs autorizadas (ver firewall)
    ports:
      - "127.0.0.1:27027:27017"
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: clicker-game
    volumes:
      - mongodb_data:/data/db
    networks:
      - clicker-network

  # Mongo Express - Administrador web de MongoDB
  # Puerto no estándar: 38081 (externo) → 8081 (interno)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: clicker-mongo-express
    restart: unless-stopped
    
    ports:
      - "0.0.0.0:38081:8081"
    
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGODB_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    depends_on:
      - mongodb
    networks:
      - clicker-network

volumes:
  mongodb_data:
    driver: local

networks:
  clicker-network:
    driver: bridge
