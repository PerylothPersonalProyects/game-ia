version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: clicker-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: clicker-game
    volumes:
      - mongodb_data:/data/db
    networks:
      - clicker-network

  # Mongo Express (interfaz web para administrar la DB)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: clicker-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - clicker-network

volumes:
  mongodb_data:
    driver: local

networks:
  clicker-network:
    driver: bridge
