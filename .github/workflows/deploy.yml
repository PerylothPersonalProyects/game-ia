name: Deploy & E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_endpoint:
        description: 'Endpoint para tests E2E (URL completa)'
        required: true
        type: string

env:
  NODE_VERSION: '20'

jobs:
  # Job de E2E tests (Playwright + Karate)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get test endpoint
        id: endpoint
        run: |
          if [ "${{ github.event.inputs.test_endpoint }}" != "" ]; then
            echo "ENDPOINT=${{ github.event.inputs.test_endpoint }}" >> $GITHUB_OUTPUT
          else
            echo "ENDPOINT=${{ secrets.TEST_ENDPOINT }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Playwright tests
      - name: Install Playwright
        working-directory: ./qa
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./qa
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.endpoint.outputs.ENDPOINT }}

      # Karate tests
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Karate tests
        working-directory: ./karate
        run: gradle test
        env:
          BASE_URL: ${{ steps.endpoint.outputs.ENDPOINT }}
