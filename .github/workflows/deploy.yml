name: Deploy & E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_endpoint:
        description: 'Endpoint para tests E2E (URL completa)'
        required: true
        type: string

env:
  NODE_VERSION: '20'

jobs:
  # Job de deploy (solo en push a main)
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }} &&
            git pull origin main &&
            npm run db:migrate
          "

  # Job de E2E tests (Playwright + Karate)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get test endpoint
        id: endpoint
        run: |
          if [ "${{ github.event.inputs.test_endpoint }}" != "" ]; then
            echo "ENDPOINT=${{ github.event.inputs.test_endpoint }}" >> $GITHUB_OUTPUT
          else
            echo "ENDPOINT=${{ secrets.TEST_ENDPOINT }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Playwright tests
      - name: Install Playwright
        run: |
          cd qa && npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          cd qa && npx playwright test
        env:
          TEST_ENDPOINT: ${{ steps.endpoint.outputs.ENDPOINT }}

      # Karate tests
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Karate tests
        run: |
          cd karate && gradle test
        env:
          TEST_ENDPOINT: ${{ steps.endpoint.outputs.ENDPOINT }}
