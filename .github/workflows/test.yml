name: CI - Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  vitest-server-coverage:
    name: Vitest Coverage (server-cliker-ia)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-cliker-ia/package-lock.json
      
      - name: Install dependencies
        working-directory: ./server-cliker-ia
        run: npm ci --legacy-peer-deps
      
      - name: Run Vitest with Coverage
        working-directory: ./server-cliker-ia
        run: npm run test:coverage
      
      - name: Upload Coverage Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage-report
          path: server-cliker-ia/coverage/
          retention-days: 1

  vitest-client-coverage:
    name: Vitest Coverage (cliker-ia)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cliker-ia/package-lock.json
      
      - name: Install dependencies
        working-directory: ./cliker-ia
        run: npm ci --legacy-peer-deps
      
      - name: Run Vitest with Coverage
        working-directory: ./cliker-ia
        run: npm run test:coverage
      
      - name: Upload Coverage Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage-report
          path: cliker-ia/coverage/
          retention-days: 1

  test-summary:
    name: Test Summary
    needs: [vitest-server-coverage, vitest-client-coverage]
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "## Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test suites completed. Check the artifacts for detailed results." >> $GITHUB_STEP_SUMMARY