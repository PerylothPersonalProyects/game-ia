name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: 

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Backend tests
      - name: Install backend dependencies
        working-directory: ./server-cliker-ia
        run: npm ci

      - name: Run backend tests
        working-directory: ./server-cliker-ia
        run: npm run test

      # Frontend tests
      - name: Install frontend dependencies
        working-directory: ./cliker-ia
        run: npm ci

      - name: Run frontend tests
        working-directory: ./cliker-ia
        run: npm run test

  build:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./cliker-ia
        run: npm ci

      - name: Build
        working-directory: ./cliker-ia
        run: npm run build

      - name: Zip build artifacts
        working-directory: ./cliker-ia
        run: zip -r ../cliker-ia-build.zip dist/

      - name: Create Git Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG=v${{ steps.version.outputs.VERSION }}
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists, skipping"
          fi

      - name: Create Release with Build & Test Reports
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            cliker-ia-build.zip
            playwright-report/**
            karate-report/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            APP_DIR=${{ secrets.DEPLOY_PATH }}
            cd $APP_DIR
            LOG_FILE="$APP_DIR/deployment_$(date +%Y-%m-%d_%H-%M-%S).log"
            {
              echo "🚀 Pulling latest changes..."
              git pull origin main &&
              echo "📦 Installing dependencies..."
              npm ci &&
              echo "🔄 Running database migrations..."
              npm run db:migrate &&
              echo "🧹 Clearing cache..."
              npm run cache:clear
            } > $LOG_FILE 2>&1 || {
              echo "❌ An error occurred during deployment. See $LOG_FILE for details."
              exit 1
            }
          '
