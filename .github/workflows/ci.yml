name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Backend tests
      - name: Install backend dependencies
        run: cd server-cliker-ia && npm ci

      - name: Run backend tests
        run: cd server-cliker-ia && npm run test

      # Frontend tests
      - name: Install frontend dependencies
        run: cd cliker-ia && npm ci

      - name: Run frontend tests
        run: cd cliker-ia && npm run test

      # Playwright tests (E2E)
      - name: Install Playwright
        run: |
          cd qa && npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          cd qa && npx playwright test --html --report-html

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: qa/playwright-report
          retention-days: 30

      # Karate tests (API)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Karate tests
        run: |
          cd karate && gradle test
        working-directory: .

      - name: Upload Karate reports
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: karate-report
          path: karate/target/karate-reports
          retention-days: 30

  build:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          continue-on-error: true

      - name: Download Karate report
        uses: actions/download-artifact@v4
        with:
          name: karate-report
          continue-on-error: true

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: cd cliker-ia && npm ci

      - name: Build
        run: cd cliker-ia && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: cliker-ia/dist
          retention-days: 7

      - name: Create Git Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Create Release with Build & Test Reports
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            cliker-ia/dist/*
            playwright-report/**
            karate-report/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }} &&
            git pull origin main &&
            npm run db:migrate
          "
